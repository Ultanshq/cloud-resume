<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Ultanshq | Cloud Engineer</title>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div class="text-center">
        <h1 class="text-5xl font-extrabold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
            Halo, Saya Ultanshq
        </h1>
        <p class="text-xl text-slate-400 mb-8 max-w-lg">
            Aspiring Cloud Engineer yang fokus pada serverless architecture dan otomasi.
        </p>

        <div class="flex justify-center gap-4">
            <a href="https://github.com/Ultanshq" target="_blank" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-full font-semibold transition">GitHub</a>
            <a href="mailto:sultandan216@gmail.com" class="border border-slate-700 hover:bg-slate-800 px-6 py-2 rounded-full font-semibold transition">Kontak Saya</a>
        </div>
    </div>

    <div class="mt-16 text-slate-500">
        Total Pengunjung: <span id="visitor-count" class="font-bold text-emerald-400">Menghitung...</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAE-X9fDL9m0lZp9bgUoUMfmF0FF-r-ucw",
            authDomain: "cloud-resume-stats.firebaseapp.com",
            projectId: "cloud-resume-stats",
            storageBucket: "cloud-resume-stats.firebasestorage.app",
            messagingSenderId: "912524500120",
            appId: "1:912524500120:web:1de4d503a7ec8ef687c4ed"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const counterRef = doc(db, "stats", "visitors");
        
        // Update & Fetch
        updateDoc(counterRef, { count: increment(1) }).then(() => {
            getDoc(counterRef).then((snap) => {
                document.getElementById("visitor-count").innerText = snap.data().count;
            });
        });
    </script>
</body>
</html>
